name: Release macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS app bundle
        run: npm run tauri build

      - name: Package .app for download
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          APP_PATH="src-tauri/target/release/bundle/macos/Samsmrti.app"
          OUT_DIR="dist-release"
          mkdir -p "$OUT_DIR"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" \
            "$OUT_DIR/Samsmrti-${VERSION}-macos.zip"
          if ls src-tauri/target/release/bundle/dmg/*.dmg 1>/dev/null 2>&1; then
            cp src-tauri/target/release/bundle/dmg/*.dmg "$OUT_DIR/"
          fi
          ls -la "$OUT_DIR"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsmrti-macos
          path: dist-release/*
          if-no-files-found: error

      - name: Publish GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
          body: |
            macOS application only — no database or user library included.
            On first launch you get a fresh library (with seeded example decks).
            Use **File → Backup (Full)** to move an existing library between machines.
